<svg width="200" height="60" viewBox="0 0 200 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0000ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6495ed;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Icono de consultoría - gráfico de barras ascendente -->
  <g transform="translate(10, 15)">
    <!-- Base del gráfico -->
    <rect x="0" y="25" width="30" height="2" fill="#15212a"/>
    
    <!-- Barras ascendentes -->
    <rect x="2" y="20" width="4" height="5" fill="url(#logoGradient)"/>
    <rect x="8" y="15" width="4" height="10" fill="url(#logoGradient)"/>
    <rect x="14" y="10" width="4" height="15" fill="url(#logoGradient)"/>
    <rect x="20" y="5" width="4" height="20" fill="url(#logoGradient)"/>
    <rect x="26" y="0" width="4" height="25" fill="url(#logoGradient)"/>
    
    <!-- Flecha de crecimiento -->
    <path d="M 15 -5 L 20 -10 L 25 -5" stroke="#0000ff" stroke-width="2" fill="none"/>
    <line x1="20" y1="-10" x2="20" y2="-2" stroke="#0000ff" stroke-width="2"/>
  </g>
  
  <!-- Texto LEEXMS -->
  <text x="50" y="35" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#15212a">
    LEEXMS
  </text>
  
  <!-- Tagline -->
  <text x="50" y="48" font-family="Arial, sans-serif" font-size="10" font-weight="400" fill="#4169e1">
    CONSULTORÍA EMPRESARIAL
  </text>
</svg>
